[phases.setup]
# Drop nix pnpm so corepack owns the pnpm version from package.json (pnpm@10.30.1).
nixPkgs = ["git", "nodejs_24", "pnpm", "python3", "gcc", "gnumake"]

[phases.install]
cmds = [
  "pnpm install --frozen-lockfile",
]
dependsOn = ["setup"]

[phases.build]
cmds = ["pnpm run build"]
dependsOn = ["install"]

[variables]
NODE_OPTIONS = "--max-old-space-size=4096"
