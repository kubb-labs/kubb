openapi: 3.0.3
info:
  title: Simple API
  version: 1.0.0
paths:
  /items/{id}:
    get:
      operationId: getItem
      summary: Get an item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
components:
  schemas:
    Item:
      type: object
      description: A simple item
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier
        name:
          type: string
          description: Display name
        count:
          type: integer
          format: int32
