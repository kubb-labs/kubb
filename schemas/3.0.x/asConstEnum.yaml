openapi: 3.0.3
info:
  title: asConst enum import mismatch
  description: |
    Regression test for Bug 3: with enumType='asConst', enum files export
    `const fooBar` (camelCase) + `type FooBarKey` (PascalCase+Key), but
    importing files reference `FooBar` (PascalCase without Key). The fix
    adds `export type FooBar = FooBarKey` to bridge the mismatch.
  version: 1.0.0
paths: {}
components:
  schemas:
    Status:
      type: string
      enum:
        - active
        - inactive
        - pending
    Priority:
      type: string
      enum:
        - low
        - medium
        - high
        - critical
    Task:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
        status:
          $ref: "#/components/schemas/Status"
        priority:
          $ref: "#/components/schemas/Priority"
        title:
          type: string
