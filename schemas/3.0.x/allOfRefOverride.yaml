openapi: 3.0.3
info:
  title: allOf $ref name override
  description: |
    Regression test for Bug 1: when a property uses allOf with a single $ref,
    the allOf flatten overrides node.name to the property name instead of the
    $ref target name, producing `type content = content` instead of
    `type content = TestContent`.
  version: 1.0.0
paths: {}
components:
  schemas:
    TestContent:
      type: object
      properties:
        body:
          type: string
        format:
          type: string
          enum:
            - plain
            - html
    TestName:
      type: string
    CreateTestRequest:
      type: object
      required:
        - name
      properties:
        content:
          allOf:
            - $ref: "#/components/schemas/TestContent"
          nullable: true
        name:
          $ref: "#/components/schemas/TestName"
