packages:
  - packages/*
  - internals/*
allowBuilds:
  '@parcel/watcher': true
  core-js: true
  es5-ext: true
  esbuild: true
  msw: true
catalog:
  '@size-limit/file': ^12.1.0
  '@types/node': ^22.19.19
  '@types/react': ^19.2.16
  '@types/react-reconciler': 0.33.0
  '@vitest/coverage-v8': ^4.1.7
  '@vitest/ui': ^4.1.7
  oxfmt: ^0.51.0
  oxlint: ^1.67.0
  p-limit: ^7.3.0
  react: 19.2.6
  react-reconciler: 0.33.0
  remeda: ^2.37.0
  'size-limit': ^12.1.0
  # tinyexec 1.2.x lost npm `trusted-with-provenance` status; stay on 1.1.x until restored.
  'tinyexec': ~1.1.2
  tsdown: ^0.22.1
  typescript: ^6.0.3
  vitest: ^4.1.7
  yaml: ^2.9.0
minimumReleaseAge: 4320 # 72 hours, matches .npmrc min-package-age
# Native platform bindings are always co-published with their parent package in the same release.
# Excluding them avoids false-positive ERR_PNPM_NO_MATURE_MATCHING_VERSION errors.
minimumReleaseAgeExclude:
  - "@types/*"
pmOnFail: warn
resolutionMode: highest
