packages:
  - packages/*
  - internals/*
allowBuilds:
  "@parcel/watcher": true
  core-js: true
  es5-ext: true
  esbuild: true
  msw: true
catalog:
  "@types/node": ^22.20.1
  "@vitest/coverage-v8": ^4.1.10
  "@vitest/ui": ^4.1.10
  oxfmt: ^0.57.0
  oxlint: ^1.73.0
  "tinyexec": ^1.2.4
  tsdown: ^0.22.3
  typescript: ^6.0.3
  vitest: ^4.1.10
  yaml: ^2.9.0
minimumReleaseAge: 4320 # 72 hours, matches .npmrc min-package-age
# Native platform bindings are always co-published with their parent package in the same release.
# Excluding them avoids false-positive ERR_PNPM_NO_MATURE_MATCHING_VERSION errors.
minimumReleaseAgeExclude:
  - "@types/*"
pmOnFail: warn
resolutionMode: highest
