name: Release
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional: Custom tag for canary release'
        required: false
        type: string
  push:
    branches: ['main', 'alpha', 'beta', 'rc']
    paths:
      - '.changeset/**'
      - 'packages/**'

# Deny all permissions at workflow level; each job declares only what it needs.
# id-token: write is intentionally restricted to the publish job so that
# build/test steps never have access to an OIDC token that could publish to npm.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-test:
    name: Build and Test
    if: github.repository_owner == 'kubb-labs'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: kubb-labs/config/.github/setup@a71ab88377ae067bbf7af843528783c7b7913a95 # main
        with:
          node-version: '22'

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  release:
    name: Release
    if: github.repository_owner == 'kubb-labs'
    needs: [build-test]
    timeout-minutes: 15
    runs-on: ubuntu-latest
    # id-token: write is scoped to this job only, which runs after tests pass.
    # The fresh install below avoids restoring a potentially poisoned pnpm cache.
    permissions:
      contents: write
      id-token: write
      packages: write
      pull-requests: write
      issues: write
    outputs:
      published_packages: ${{ steps.changesets.outputs.publishedPackages }}
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools (turbo cache disabled; pnpm store cache is low-risk since no pull_request_target writes to base cache)
        uses: kubb-labs/config/.github/setup@a71ab88377ae067bbf7af843528783c7b7913a95 # main
        with:
          node-version: '22'
          cache: 'false'

      - name: Build
        run: pnpm run build

      - name: Publish
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1
        if: ${{ github.event.inputs.tag == '' }}
        with:
          publish: pnpm release
          commit: 'ci(changesets): version packages'
          setupGitUser: false
        env:
          NPM_CONFIG_PROVENANCE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish ${{ inputs.tag || 'canary' }}
        id: canary
        if: steps.changesets.outputs.published != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          RELEASE_TAG: ${{ inputs.tag || 'canary' }}
        run: |
          git checkout main
          pnpm version:canary
          pnpm release:canary --tag "$RELEASE_TAG"

  get-version:
    name: Get Published Version
    if: needs.release.outputs.published == 'true'
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.result }}
    steps:
      - name: Get version
        id: version
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        env:
          PUBLISHED_PACKAGES: ${{ needs.release.outputs.published_packages }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          result-encoding: string
          script: |
            const publishedPackages = JSON.parse(process.env.PUBLISHED_PACKAGES || '[]');
            const corePackage = publishedPackages.find(pkg => pkg.name === '@kubb/core');
            return corePackage?.version || '';
  notify:
    name: Send Discord Notification
    if: needs.release.outputs.published == 'true'
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Send a discord notification
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PUBLISHED_PACKAGES: ${{ needs.release.outputs.published_packages }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const publishedPackages = JSON.parse(process.env.PUBLISHED_PACKAGES || '[]');
            const corePackage = publishedPackages.find(pkg => pkg.name === '@kubb/core');
            const version = corePackage?.version || '';
            const versionSlug = version.replace(/\./g, '-');
            const docsUrl = version ? `https://www.kubb.dev/kubb/changelog#_${versionSlug}` : 'https://www.kubb.dev/kubb/changelog';

            fetch(process.env.DISCORD_WEBHOOK_URL, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                content: `A new release is available 🎉. \n [Read the changelog](https://github.com/kubb-labs/kubb/releases) \n [View docs changelog](${docsUrl})`
              }),
            })
            .then((res) => {
              console.log('Sent discord notification', res)
            })
            .catch((err) => {
              console.error('Error sending discord notification', err)
            })
