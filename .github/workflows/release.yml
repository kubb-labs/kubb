name: Release
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Release mode (version = open the Version Packages PR only, no npm publish)'
        type: choice
        options: [version, staged, publish]
        default: version
  push:
    branches: ['main', 'alpha', 'beta', 'rc']
    paths:
      - '.changeset/**'
      - 'packages/**'
      - '.github/workflows/release.yml'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    if: github.repository_owner == 'kubb-labs' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    timeout-minutes: 15
    runs-on: ubuntu-latest
    # id-token: write enables npm OIDC trusted publishing — no NPM_TOKEN needed.
    permissions:
      contents: write
      id-token: write
      packages: write
      pull-requests: write
      issues: write
    outputs:
      released: ${{ steps.changesets.outputs.staged == 'true' || steps.changesets.outputs.published == 'true' }}
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: kubb-labs/config/.github/setup@61cdd3211cf116b44033357a5baff45dc28f0ca5 # main
        with:
          node-version: '22.22.3'
          cache: 'false'
          force-install: 'true'

      - name: Resolve release command
        id: cmd
        shell: bash
        # MODE comes from env to avoid script injection from workflow inputs.
        env:
          MODE: ${{ inputs.mode || 'publish' }}
        run: |
          case "$MODE" in
            publish) echo "publish=pnpm exec changeset publish" >> "$GITHUB_OUTPUT" ;;
            staged) echo "publish=pnpm release:stage" >> "$GITHUB_OUTPUT" ;;
            version) echo "publish=" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unknown mode: $MODE" >&2; exit 1 ;;
          esac

      - name: Build
        if: ${{ steps.cmd.outputs.publish != '' }}
        run: pnpm run build

      - name: Release
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1
        with:
          version: pnpm exec changeset version
          publish: ${{ steps.cmd.outputs.publish }}
          commit: 'ci(changesets): version packages'
          title: 'ci(changesets): version packages'
          setupGitUser: false
        env:
          NPM_CONFIG_PROVENANCE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish canary
        if: ${{ steps.changesets.outputs.published != 'true' && steps.changesets.outputs.staged != 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        continue-on-error: true
        shell: bash
        env:
          NPM_CONFIG_PROVENANCE: true
        # Stamp each package to a unique canary version so it can't collide
        # with the `latest` tag, then rebuild and publish.
        run: |
          pnpm -r exec bash -c '
            npm --no-git-tag-version version minor || true
            version=$(node -p "require(\"./package.json\").version")
            canary_version="${version}-canary.$(date +%Y%m%dT%H%M%S)"
            echo "Version that will be published: ${canary_version}"
            npm --no-git-tag-version version "${canary_version}" || true
          '
          pnpm run build
          pnpm exec changeset publish --tag canary

  notify:
    name: Send Discord Notification
    needs: [release]
    if: ${{ needs.release.outputs.released == 'true' }}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Send a discord notification
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Guard lives here because the secrets context is unavailable in step `if:`.
            if (!process.env.DISCORD_WEBHOOK_URL) {
              console.log('DISCORD_WEBHOOK_URL not set, skipping notification');
              return;
            }
            fetch(process.env.DISCORD_WEBHOOK_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                content: `A new release is available 🎉. \n [Read the changelog](https://github.com/${context.repo.owner}/${context.repo.repo}/releases)`,
              }),
            })
              .then((res) => {
                console.log('Sent discord notification', res.status);
              })
              .catch((err) => {
                console.error('Error sending discord notification', err);
              });

  # not needed as the sync-changelog-docs will already to the trick
  # deploy-platform:
  #   name: Dispatch content-updated to platform
  #   needs: [release]
  #   if: ${{ needs.release.outputs.released == 'true' }}
  #   runs-on: ubuntu-latest
  #   permissions: {}
  #   steps:
  #     - uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3
  #       with:
  #         token: ${{ secrets.PLATFORM_DISPATCH_TOKEN }}
  #         repository: kubb-labs/platform
  #         event-type: content-updated
  #         client-payload: '{"source": "kubb", "tag": "${{ github.ref_name }}"}'

  sync-changelog-docs:
    name: Dispatch changelog-sync to docs
    needs: [release]
    if: ${{ needs.release.outputs.released == 'true' }}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3
        with:
          token: ${{ secrets.PLATFORM_DISPATCH_TOKEN }}
          repository: kubb-labs/docs
          event-type: changelog-sync
          client-payload: '{"ref": "${{ github.ref_name }}"}'
