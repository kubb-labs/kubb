name: Release
on:
  workflow_dispatch:
  push:
    branches: ['main', 'alpha', 'beta', 'rc']
    paths:
      - '.changeset/**'
      - 'packages/**'
      - '.github/workflows/release.yml'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    if: github.repository_owner == 'kubb-labs' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    timeout-minutes: 15
    runs-on: ubuntu-latest
    # id-token: write enables npm OIDC trusted publishing — no NPM_TOKEN needed.
    permissions:
      contents: write
      id-token: write
      packages: write
      pull-requests: write
      issues: write
    outputs:
      released: ${{ steps.changesets.outputs.staged == 'true' }}
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: kubb-labs/config/.github/setup@61cdd3211cf116b44033357a5baff45dc28f0ca5 # main
        with:
          node-version: '22'
          cache: 'false'
          force-install: 'true'

      - name: Build
        run: pnpm run build

      # When pending changesets exist, changesets/action opens the Version
      # Packages PR. When versions are already bumped, it runs the publish
      # command, which stages the workspace via `scripts/release.mjs`.
      - name: Release
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1
        with:
          version: pnpm exec changeset version
          publish: node scripts/release.mjs
          commit: 'ci(changesets): version packages'
          title: 'ci(changesets): version packages'
          setupGitUser: false
        env:
          NPM_CONFIG_PROVENANCE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish canary
        if: ${{ steps.changesets.outputs.staged != 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        shell: bash
        env:
          NPM_CONFIG_PROVENANCE: true
        # Stamp each package to a unique canary version so it can't collide
        # with the `latest` tag, then rebuild and publish.
        run: |
          pnpm -r exec bash -c '
            npm --no-git-tag-version version minor || true
            version=$(node -p "require(\"./package.json\").version")
            canary_version="${version}-canary.$(date +%Y%m%dT%H%M%S)"
            echo "Version that will be published: ${canary_version}"
            npm --no-git-tag-version version "${canary_version}" || true
          '
          pnpm run build
          pnpm exec changeset publish --tag canary

  notify:
    name: Send Discord Notification
    needs: [release]
    if: ${{ needs.release.outputs.released == 'true' }}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Send a discord notification
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Guard lives here because the secrets context is unavailable in step `if:`.
            if (!process.env.DISCORD_WEBHOOK_URL) {
              console.log('DISCORD_WEBHOOK_URL not set, skipping notification');
              return;
            }
            fetch(process.env.DISCORD_WEBHOOK_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                content: `A new release is available 🎉. \n [Read the changelog](https://github.com/${context.repo.owner}/${context.repo.repo}/releases)`,
              }),
            })
              .then((res) => {
                console.log('Sent discord notification', res.status);
              })
              .catch((err) => {
                console.error('Error sending discord notification', err);
              });
