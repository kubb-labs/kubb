name: PR

on:
  workflow_dispatch:
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: kubb-labs/config/.github/setup@8508e66e6014b9ca1416591bc20791027b6ccf5c # main
        with:
          node-version: '22'

      - name: Build
        run: pnpm run build

  typecheck:
    name: Typecheck
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.actor != 'github-actions[bot]'
    needs: build
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: kubb-labs/config/.github/setup@8508e66e6014b9ca1416591bc20791027b6ccf5c # main
        with:
          node-version: '22'

      - name: Build
        run: pnpm run build

      - name: Typecheck
        run: pnpm run typecheck

  tests:
    name: Tests
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.actor != 'github-actions[bot]'
    needs: build
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: kubb-labs/config/.github/setup@8508e66e6014b9ca1416591bc20791027b6ccf5c # main
        with:
          node-version: '22'

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test --coverage

      - name: Upload coverage reports to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  linting:
    name: Linting
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: kubb-labs/config/.github/setup@8508e66e6014b9ca1416591bc20791027b6ccf5c # main
        with:
          node-version: '22'

      - name: Linting
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
        run: pnpm run lint

  spellcheck:
    name: Spell Check
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: kubb-labs/config/.github/setup@8508e66e6014b9ca1416591bc20791027b6ccf5c # main
        with:
          node-version: '22'

      - name: Spell Check
        uses: streetsidesoftware/cspell-action@9c7145a5e625e30cb68f6932b379e17eb024d974 # v8
        with:
          files: |
            **/*.{ts,md}
          suggestions: 'true'
          config: 'cspell.json'

  prerelease:
    name: Prerelease
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    needs: build
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2

      - name: Setup Tools
        uses: kubb-labs/config/.github/setup@8508e66e6014b9ca1416591bc20791027b6ccf5c # main
        with:
          node-version: '22'

      - name: Build
        run: pnpm run build

      - name: Publish preview packages
        run: pnpx pkg-pr-new publish --pnpm --owner=stijnvanhulle --repo=https://github.com/kubb-labs/kubb.git './packages/*'

  benchmarks:
    name: Performance benchmarks (Vitest)
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: github.actor != 'github-actions[bot]'
    needs: build
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: kubb-labs/config/.github/setup@8508e66e6014b9ca1416591bc20791027b6ccf5c # main
        with:
          node-version: '22'

      - name: Build
        run: pnpm run build

      - name: Run Vitest benchmarks
        run: pnpm run test:bench

      - name: Post benchmark results as PR comment
        if: github.event_name == 'pull_request' && hashFiles('bench-output.json') != ''
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs')

            const raw = JSON.parse(fs.readFileSync('bench-output.json', 'utf8'))

            // Vitest bench JSON: { files: [{ filepath, groups: [{ fullName, benchmarks: [...] }] }] }
            const files = raw.files ?? []

            if (files.length === 0) {
              console.log('No benchmark results found in bench-output.json')
              return
            }

            const fmt = (n) => (typeof n === 'number' ? n.toFixed(4) : String(n))
            const fmtHz = (n) => (typeof n === 'number' ? n.toFixed(2) : String(n))
            const fmtRme = (n) => (typeof n === 'number' ? `±${n.toFixed(2)}%` : String(n))
            const fmtSamples = (s) => (Array.isArray(s) ? s.length : s)

            let body = '## Vitest Benchmark Results\n\n'

            for (const file of files) {
              const shortPath = file.filepath.replace(/^.*packages\//, 'packages/')
              body += `### \`${shortPath}\`\n\n`

              for (const group of file.groups ?? []) {
                body += `**${group.fullName}**\n\n`
                body += '| name | hz | min (ms) | max (ms) | mean (ms) | p75 | p99 | p995 | p999 | rme | samples |\n'
                body += '|------|---:|---:|---:|---:|---:|---:|---:|---:|---:|---:|\n'

                for (const b of group.benchmarks ?? []) {
                  body += `| ${b.name} | ${fmtHz(b.hz)} | ${fmt(b.min)} | ${fmt(b.max)} | ${fmt(b.mean)} | ${fmt(b.p75)} | ${fmt(b.p99)} | ${fmt(b.p995)} | ${fmt(b.p999)} | ${fmtRme(b.rme)} | ${fmtSamples(b.samples)} |\n`
                }

                body += '\n'
              }
            }

            body += `<sub>Generated by [Vitest bench](https://vitest.dev/guide/features#benchmarking) on ${new Date().toUTCString()}</sub>`

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })

            const marker = '## Vitest Benchmark Results'
            const existing = comments.find(c => c.user?.login === 'github-actions[bot]' && c.body?.startsWith(marker))

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }

  dependency-diff:
    name: Dependency Diff
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Analyze dependency changes
        uses: e18e/action-dependency-diff@5d3c6ac2ad2de2eaca1dc120c5accfd9590764b6 # v1
        continue-on-error: true
        with:
          duplicate-threshold: 5
          size-threshold: -1
