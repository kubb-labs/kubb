name: Changelog

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to generate changelog for (e.g. 4.32.1)'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Version to generate changelog for'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  changelog:
    name: Update Changelog
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create changelog PR for Copilot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          BRANCH="changelog/v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git commit --allow-empty -m "chore: placeholder for changelog v${VERSION}"
          git push origin "$BRANCH"
          gh pr create \
            --title "Update docs/changelog.md for v${VERSION}" \
            --body "@copilot Please update \`docs/changelog.md\` for the \`v${VERSION}\` release.

          - Add a new section at the top for \`v${VERSION}\`
          - Summarize the changes from the \`.changeset/\` files that were part of this release
          - Follow the existing format and style already present in \`docs/changelog.md\`" \
            --base main \
            --head "$BRANCH" \
            --reviewer copilot
