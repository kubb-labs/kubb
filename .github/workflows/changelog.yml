name: Changelog

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to generate changelog for (e.g. 4.32.1)'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Version to generate changelog for'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  changelog:
    name: Update Changelog
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate and prepend changelog entry
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          # Get commits between the previous tag and this release
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "v${VERSION}" | head -1)
          CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)

          if [ -z "$CHANGES" ]; then
            echo "No commits found since ${PREV_TAG}, skipping."
            exit 0
          fi

          # Generate changelog entry via GitHub Models
          NEW_ENTRY=$(echo "$CHANGES" | gh models run github/gpt-4o \
            --system-prompt "You are a release engineer writing a changelog for an open-source TypeScript library called Kubb. Given a list of git commits, produce a clean markdown changelog section for version v${VERSION}. Group changes under '### Features', '### Bug Fixes', and '### Internal' headings. Be concise. Output only the markdown text, no code fences.")

          # Prepend to existing changelog
          echo -e "${NEW_ENTRY}\n" | cat - docs/changelog.md > /tmp/changelog.md
          mv /tmp/changelog.md docs/changelog.md

      - name: Open PR with updated changelog
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "docs: update changelog for v${{ inputs.version }}"
          title: "docs: update changelog for v${{ inputs.version }}"
          body: "Changelog entry for `v${{ inputs.version }}` generated from `.changeset/` files via GitHub Models."
          branch: "changelog/v${{ inputs.version }}"
          base: main
          delete-branch: true
