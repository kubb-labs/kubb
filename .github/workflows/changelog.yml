name: Changelog

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to generate changelog for (e.g. 4.32.1)'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Version to generate changelog for'
        required: true
        type: string

permissions:
  issues: write

jobs:
  changelog:
    name: Update Changelog
    runs-on: ubuntu-latest
    steps:
      - name: Create issue for Copilot coding agent
        env:
          # Requires a PAT with repo scope — GITHUB_TOKEN cannot trigger the coding agent
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Update docs/changelog.md for v${{ inputs.version }}" \
            --body "Update \`docs/changelog.md\` for the \`v${{ inputs.version }}\` release. Add a new section at the top, summarize the changes from the \`.changeset/\` files, and follow the existing format." \
            --assignee copilot-swe-agent
