name: Changelog

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to generate changelog for (e.g. 4.32.1)'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Version to generate changelog for'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  changelog:
    name: Update Changelog
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate and prepend changelog entry
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "v${VERSION}" | head -1)
          CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)

          if [ -z "$CHANGES" ]; then
            echo "No commits found since ${PREV_TAG}, skipping."
            exit 0
          fi

          SKILL=$(cat .skills/changelog/SKILL.md)

          NEW_ENTRY=$(curl -s https://models.inference.ai.azure.com/chat/completions \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg skill "$SKILL" \
              --arg changes "$CHANGES" \
              --arg version "$VERSION" \
              '{
                model: "gpt-4o",
                messages: [
                  {role: "system", content: "You are a release engineer for Kubb, an open-source TypeScript code-generation toolkit. Follow these guidelines exactly:\n\n\($skill)"},
                  {role: "user", content: "Generate a changelog entry for version v\($version) based on these commits:\n\n\($changes)\n\nOutput only the markdown for this version section, starting with ## \($version). No code fences wrapping the output."}
                ]
              }')" \
            | jq -r '.choices[0].message.content')

          echo -e "${NEW_ENTRY}\n" | cat - docs/changelog.md > /tmp/changelog.md
          mv /tmp/changelog.md docs/changelog.md

      - name: Open PR with updated changelog
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "docs: update changelog for v${{ inputs.version }}"
          title: "docs: update changelog for v${{ inputs.version }}"
          body: "Changelog entry for `v${{ inputs.version }}` generated from `.changeset/` files via GitHub Models."
          branch: "changelog/v${{ inputs.version }}"
          base: main
          delete-branch: true
