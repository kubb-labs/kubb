# configuration related to pull request comments
comment: false # do not comment PR with the result

ignore:
  - '**/examples/**'
  - '**/tests/**'

coverage:
  range: 50..90 # coverage lower than 50 is red, higher than 90 green, between color code

  status:
    project: # settings affecting project coverage
      default:
        target: auto # auto % coverage target
        threshold: 1% # allow for 1% reduction of coverage without failing

    # do not run coverage on patch nor changes
    patch: off

bundle_analysis:
  warning_threshold: '10MB'
  status: true

component_management:
  individual_components:
    - component_id: adapter-oas
      name: '@kubb/adapter-oas'
      paths:
        - packages/adapter-oas/**
    - component_id: ast
      name: '@kubb/ast'
      paths:
        - packages/ast/**
    - component_id: cli
      name: '@kubb/cli'
      paths:
        - packages/cli/**
    - component_id: core
      name: '@kubb/core'
      paths:
        - packages/core/**
    - component_id: kubb
      name: 'kubb'
      paths:
        - packages/kubb/**
    - component_id: mcp
      name: '@kubb/mcp'
      paths:
        - packages/mcp/**
    - component_id: parser-md
      name: '@kubb/parser-md'
      paths:
        - packages/parser-md/**
    - component_id: parser-ts
      name: '@kubb/parser-ts'
      paths:
        - packages/parser-ts/**
    - component_id: plugin-barrel
      name: '@kubb/plugin-barrel'
      paths:
        - packages/plugin-barrel/**
    - component_id: renderer-jsx
      name: '@kubb/renderer-jsx'
      paths:
        - packages/renderer-jsx/**
    - component_id: unplugin-kubb
      name: 'unplugin-kubb'
      paths:
        - packages/unplugin-kubb/**
